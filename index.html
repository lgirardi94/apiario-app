<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Apiario</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>🐝 Apiario</h1>
</header>

<nav>
  <button data-section="registro">Registro</button>
  <button data-section="arnie">Arnie</button>
  <button data-section="magazzino">Magazzino</button>
</nav>

<main>

<!-- REGISTRO -->
<section id="registro">
  <h2>Registro</h2>

  <input type="date" id="logData">
  
  <select id="logArnia"></select>

  <textarea id="logNote" placeholder="Note..."></textarea>

  <button id="saveLog">Salva</button>

  <div id="logEntries"></div>
</section>

<!-- ARNIE -->
<section id="arnie" style="display:none">
  <h2>Arnie</h2>

  <input id="arniaNome" placeholder="Nome arnia">
  <button id="addArnia">Aggiungi</button>

  <div id="arnieGrid"></div>
</section>

<!-- MAGAZZINO -->
<section id="magazzino" style="display:none">
  <h2>Magazzino</h2>

  <input id="artNome" placeholder="Nome articolo">
  <select id="artUnita">
    <option value="pz">pz</option>
    <option value="kg">kg</option>
  </select>
  <button id="addArticolo">Aggiungi</button>

  <div id="magGrid"></div>

  <h3>Movimenti</h3>
  <div id="movList"></div>
</section>

</main>

<!-- MODALE MAGAZZINO -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Movimento</h3>
    <input type="number" id="movQta" placeholder="Quantità">
    <select id="movTipo">
      <option value="entrata">Entrata</option>
      <option value="uscita">Uscita</option>
    </select>
    <button id="confirmMov">OK</button>
    <button id="closeModal">Chiudi</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apiario</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="favicon.ico">
</head>

<body>

<header class="header">
  <h1>🐝 Il Mio Apiario</h1>
</header>

<nav class="nav">
  <button data-section="registro">Registro</button>
  <button data-section="arnie">Arnie</button>
  <button data-section="magazzino">Magazzino</button>
</nav>

<main class="container">

<section id="registro" class="section active">
  <h2>Registro</h2>

  <div class="form">
    <input type="date" id="logData">
    <select id="logArnia"></select>
    <textarea id="logNote" placeholder="Note visita..."></textarea>
    <button id="saveLog">Salva</button>
  </div>

  <div id="logEntries" class="grid"></div>
</section>

<section id="arnie" class="section">
  <h2>Arnie</h2>

  <div class="form">
    <input id="arniaNome" placeholder="Nome arnia">
    <button id="addArnia">Aggiungi</button>
  </div>

  <div id="arnieGrid" class="grid"></div>
</section>

<section id="magazzino" class="section">
  <h2>Magazzino</h2>

  <div class="form">
    <input id="artNome" placeholder="Nome articolo">
    <select id="artUnita">
      <option value="pz">pz</option>
      <option value="kg">kg</option>
    </select>
    <button id="addArticolo">Aggiungi</button>
  </div>

  <div id="magGrid" class="grid"></div>

  <h3>Storico movimenti</h3>
  <div id="movList" class="grid"></div>
</section>

</main>

<!-- MODALE -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Movimento</h3>
    <input type="number" id="movQta" placeholder="Quantità">
    <select id="movTipo">
      <option value="entrata">Entrata</option>
      <option value="uscita">Uscita</option>
    </select>
    <button id="confirmMov">Conferma</button>
    <button id="closeModal">Chiudi</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>

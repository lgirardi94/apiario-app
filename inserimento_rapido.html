<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐝</text></svg>">
<title>Il Mio Apiario</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --amber: #C8860A;
    --amber-light: #E8A020;
    --amber-pale: #FDF3DC;
    --amber-glow: #F5C842;
    --dark: #1A1208;
    --dark-mid: #2E1F08;
    --brown: #5C3A10;
    --brown-light: #8B5E2A;
    --cream: #FBF5E6;
    --cream-dark: #F0E6CC;
    --text: #2A1A05;
    --text-light: #6B4A20;
    --green: #4A7C3F;
    --red: #8A2C2C;
    --blue: #2C5F8A;
    --shadow: rgba(26,18,8,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    border-bottom: 3px solid var(--amber);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.15rem;
    color: var(--amber-glow);
    font-weight: 700;
    letter-spacing: 0.5px;
    flex: 1;
  }
  .drive-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #888;
    flex-shrink: 0;
  }
  .drive-dot.connected { background: #4CAF50; }

  /* DRIVE LOGIN */
  #driveLoginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    padding: 2rem;
    text-align: center;
    gap: 1.5rem;
  }
  #driveLoginScreen .bee { font-size: 4rem; }
  #driveLoginScreen h2 { font-size: 1.3rem; color: var(--brown); }
  #driveLoginScreen p { color: var(--text-light); font-size: 0.95rem; line-height: 1.5; }

  /* TABS */
  .tab-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: var(--dark-mid);
    border-bottom: 2px solid var(--amber);
  }
  .tab-btn {
    background: none;
    border: none;
    color: rgba(251,245,230,0.5);
    padding: 0.85rem 0.5rem;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  .tab-btn .tab-icon { font-size: 1.3rem; }
  .tab-btn.active { color: var(--amber-glow); border-bottom-color: var(--amber); }

  /* MAIN CONTENT */
  .content { padding: 1.2rem; max-width: 480px; margin: 0 auto; }

  /* FORM ELEMENTS */
  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-light);
    margin-bottom: 0.4rem;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    font-size: 1rem;
    color: var(--text);
    background: white;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--amber);
    background: white;
  }
  .form-group textarea { resize: none; height: 80px; }

  /* TIPO TOGGLE */
  .tipo-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1.1rem;
  }
  .tipo-toggle-btn {
    padding: 0.85rem;
    border: 2px solid var(--cream-dark);
    border-radius: 8px;
    background: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    transition: all 0.2s;
    color: var(--text-light);
  }
  .tipo-toggle-btn.active-entrata {
    background: #e8f5e9;
    border-color: var(--green);
    color: var(--green);
  }
  .tipo-toggle-btn.active-uscita {
    background: #fce8e8;
    border-color: var(--red);
    color: var(--red);
  }

  /* IMPORTO */
  .importo-wrap { position: relative; }
  .importo-wrap .euro {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--amber);
    font-weight: 700;
    font-size: 1.1rem;
  }
  .importo-wrap input { padding-left: 2rem; font-size: 1.4rem; font-weight: 600; }

  /* CHIP */
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .chip {
    padding: 0.45rem 0.85rem;
    border: 1.5px solid var(--cream-dark);
    border-radius: 20px;
    font-size: 0.85rem;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    color: var(--text);
  }
  .chip.selected {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--dark);
    font-weight: 600;
  }
  .chip input { display: none; }

  /* SUBMIT BUTTON */
  .btn-submit {
    width: 100%;
    padding: 1rem;
    background: var(--amber);
    color: var(--dark);
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(200,134,10,0.3);
  }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.5; }

  .btn-google {
    width: 100%;
    padding: 0.9rem;
    background: white;
    color: #333;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 1.2rem 0;
    color: var(--text-light);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cream-dark);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: var(--amber-glow);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid var(--amber);
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* SUCCESS ANIMATION */
  .success-anim {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 0.8rem;
  }
  .success-anim.show { display: flex; }
  .success-icon {
    font-size: 4rem;
    animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
  .success-anim h3 { color: var(--green); font-size: 1.3rem; }
  .success-anim p { color: var(--text-light); font-size: 0.9rem; }
  .btn-another {
    margin-top: 0.5rem;
    padding: 0.7rem 1.5rem;
    background: var(--amber-pale);
    border: 1.5px solid var(--amber);
    border-radius: 8px;
    color: var(--brown);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* CARD */
  .info-card {
    background: white;
    border: 1px solid var(--cream-dark);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.8rem;
    box-shadow: 0 1px 6px var(--shadow);
  }
  .info-card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    margin-bottom: 0.3rem;
  }
  .info-card-val {
    font-size: 1.5rem;
    font-weight: 700;
    font-family: 'Georgia', serif;
  }
  .info-card-val.green { color: var(--green); }
  .info-card-val.red { color: var(--red); }
  .info-card-val.amber { color: var(--amber); }

  .recent-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .recent-item {
    background: white;
    border: 1px solid var(--cream-dark);
    border-left: 4px solid var(--cream-dark);
    border-radius: 6px;
    padding: 0.7rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .recent-item.entrata { border-left-color: var(--green); }
  .recent-item.uscita { border-left-color: var(--red); }
  .recent-item.mag-in { border-left-color: var(--blue); }
  .recent-item.mag-out { border-left-color: var(--amber); }
  .recent-item-val { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
  .recent-item-val.green { color: var(--green); }
  .recent-item-val.red { color: var(--red); }
  .recent-item-val.blue { color: var(--blue); }
  .recent-item-val.amber { color: var(--amber); }
  .recent-item-info { flex: 1; min-width: 0; }
  .recent-item-desc { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-item-date { font-size: 0.75rem; color: var(--text-light); }

  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-light);
    margin: 1.2rem 0 0.6rem;
  }
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🐝</span>
  <h1>Apiario — Inserimento rapido</h1>
  <div class="drive-dot" id="driveDot" title="Google Drive"></div>
</header>

<!-- LOGIN SCREEN -->
<div id="driveLoginScreen">
  <div class="bee">🐝</div>
  <h2>Connetti Google Drive</h2>
  <p>Accedi con il tuo account Google per sincronizzare i dati con l'apiario principale.</p>
  <button class="btn-google" onclick="driveLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Accedi con Google
  </button>
</div>

<!-- APP CONTENT -->
<div id="appContent" style="display:none">

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('riepilogo', this)">
      <span class="tab-icon">📊</span>Riepilogo
    </button>
    <button class="tab-btn" onclick="showTab('contabilita', this)">
      <span class="tab-icon">💰</span>Contabilità
    </button>
    <button class="tab-btn" onclick="showTab('magazzino', this)">
      <span class="tab-icon">📦</span>Magazzino
    </button>
  </div>

  <div class="content">

    <!-- ===== RIEPILOGO ===== -->
    <div class="section active" id="tabRiepilogo">
      <div id="riepilogoContent">
        <div style="color:var(--text-light);font-style:italic;font-size:0.9rem;text-align:center;padding:2rem">Caricamento...</div>
      </div>
    </div>

    <!-- ===== CONTABILITÀ ===== -->
    <div class="section" id="tabContabilita">
      <div id="formContSuccess" class="success-anim">
        <div class="success-icon">✅</div>
        <h3>Salvato!</h3>
        <p id="formContSuccessMsg"></p>
        <button class="btn-another" onclick="resetFormCont()">+ Inserisci un altro</button>
      </div>

      <div id="formCont">
        <div class="form-group" style="margin-bottom:0.8rem">
          <label>Tipo movimento</label>
          <div class="tipo-toggle">
            <button class="tipo-toggle-btn active-entrata" id="btnEntrata" onclick="setTipoCont('entrata')">
              🟢 Entrata
            </button>
            <button class="tipo-toggle-btn" id="btnUscita" onclick="setTipoCont('uscita')">
              🔴 Uscita
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Importo (€)</label>
          <div class="importo-wrap">
            <span class="euro">€</span>
            <input type="number" id="contImporto" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>

        <div class="form-group">
          <label>Descrizione</label>
          <input type="text" id="contDesc" placeholder="Es. Vendita 10 vasi acacia...">
        </div>

        <div class="form-group">
          <label>Categorie</label>
          <div class="chips-wrap" id="contCatChips"></div>
        </div>

        <div class="form-group">
          <label>Data</label>
          <input type="date" id="contData">

        <div class="form-group">

        </div>

        </button>

    <!-- ===== MAGAZZINO ===== -->
    <div class="section" id="tabMagazzino">
      <div id="formMagSuccess" class="success-anim">

        <h3>Salvato!</h3>
        <p id="formMagSuccessMsg"></p>
        <button class="btn-another" onclick="resetFormMag()">+ Inserisci un altro</button>
      </div>

      <div id="formMag">
        <div class="form-group">
          <label>Tipo movimento</label>
          <div class="tipo-toggle">
            <button class="tipo-toggle-btn active-entrata" id="btnMagIn" onclick="setTipoMag('entrata')">
              ➕ Entrata
            </button>
            <button class="tipo-toggle-btn" id="btnMagOut" onclick="setTipoMag('uscita')">
              ➖ Uscita
            </button>
          </div>

        <div class="form-group">
          <label>Articolo</label>
          <select id="magArticolo">
            <option value="">— Seleziona articolo —</option>

        <div class="form-group">
          <label>Quantità <span id="magUnitaLabel" style="font-weight:400;text-transform:none;letter-spacing:0"></span></label>
          <input type="number" id="magQta" inputmode="decimal" placeholder="Es. 10" min="0" step="0.1">
        </div>

        <div class="form-group">
          <label>Data</label>
          <input type="date" id="magData">
        </div>

        <div class="form-group">
          <label>Note (opzionale)</label>
          <input type="text" id="magNote" placeholder="Es. acquisto fiera, utilizzo apiario...">

        <button class="btn-submit" onclick="saveMagazzino()" id="btnSaveMag">
          💾 Salva movimento
        </button>
      </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const CLIENT_ID = '256459531928-rg44b3eo4a3hatfmuf4jevck631uir6o.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const FILENAME_DB  = 'apiario_db.json';
const FILENAME_MAG = 'apiario_magazzino.json';
const FILENAME_CONT = 'apiario_contabilita.json';

// ===== STATE =====
let driveToken = null;
let tokenClient = null;
let dbData   = { arnie: [], logBook: [] };
let magData  = { articoli: [], movimentazioni: [] };
let contData = { movimentiContabili: [] };
let tipoContabile = 'entrata';
let tipoMagazzino = 'entrata';

const CAT_ENTRATA = [
  { id: 'vendita_miele',  label: '🍯 Miele' },
  { id: 'vendita_nuclei', label: '🐝 Nuclei/regine' },
  { id: 'vendita_cera',   label: '🌿 Cera/propoli' },
  { id: 'contributi',     label: '📦 Contributi' },
  { id: 'altro_ricavo',   label: '💰 Altro' },
];
const CAT_USCITA = [
  { id: 'farmaci',        label: '💊 Farmaci' },
  { id: 'alimentazione',  label: '🍬 Alimentazione' },
  { id: 'attrezzatura',   label: '🔧 Attrezzatura' },
  { id: 'arnie',          label: '🏠 Arnie' },
  { id: 'trasporti',      label: '🚗 Trasporti' },
  { id: 'burocrazia',     label: '📋 Burocrazia' },
  { id: 'altro_costo',    label: '💡 Altro' },
];

function fmt(n) {
  return parseFloat(n||0).toLocaleString('it-IT', {minimumFractionDigits:2,maximumFractionDigits:2});
}
function formatDate(d) {
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const mesi = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  return `${parseInt(day)} ${mesi[parseInt(m)-1]} ${y}`;
}
function today() { return new Date().toISOString().slice(0,10); }

// ===== TOAST =====
function showToast(msg, duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ===== TABS =====
function showTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  btn.classList.add('active');
  if(tab === 'riepilogo') renderRiepilogo();
  if(tab === 'magazzino') populateMagArticoli();
}

// ===== GOOGLE DRIVE =====
window.addEventListener('load', () => {
  setTimeout(() => {
    if(typeof google === 'undefined') return;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if(resp.error) { showToast('❌ Errore login'); return; }
        driveToken = resp.access_token;
        localStorage.setItem('driveToken', driveToken);
        await loadAllData();
        showApp();
      }
    });
    const saved = localStorage.getItem('driveToken');
    if(saved) {
      driveToken = saved;
      loadAllData().then(showApp).catch(() => {
        driveToken = null;
        localStorage.removeItem('driveToken');
      });
    }
  }, 600);
});

function driveLogin() {
  if(!tokenClient) { showToast('⏳ Caricamento Google...'); return; }
  tokenClient.requestAccessToken();
}

async function driveGet(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + driveToken } });
  if(r.status === 401) { driveToken = null; localStorage.removeItem('driveToken'); throw new Error('401'); }
  return r;
}

async function driveFindFile(name) {
  const r = await driveGet(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${name}'&fields=files(id)`);
  const d = await r.json();
  return d.files && d.files.length > 0 ? d.files[0] : null;
}

async function driveReadFile(name) {
  const f = await driveFindFile(name);
  if(!f) return null;
  const r = await driveGet(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`);
  return await r.json();
}

async function driveWriteFile(name, payload) {
  const f = await driveFindFile(name);
  const url = f
    ? `https://www.googleapis.com/upload/drive/v3/files/${f.id}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const method = f ? 'PATCH' : 'POST';
  const meta = { name, ...(!f ? { parents: ['appDataFolder'] } : {}) };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
  await fetch(url, { method, headers: { Authorization: 'Bearer ' + driveToken }, body: form });
}

async function loadAllData() {
  const [db, mag, cont] = await Promise.all([
    driveReadFile(FILENAME_DB),
    driveReadFile(FILENAME_MAG),
    driveReadFile(FILENAME_CONT)
  ]);
  if(db)   dbData   = db;
  if(mag)  magData  = mag;
  if(cont) contData = cont;
}

function showApp() {
  document.getElementById('driveLoginScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  document.getElementById('driveDot').classList.add('connected');
  // init forms
  document.getElementById('contData').value = today();
  document.getElementById('magData').value  = today();
  renderCatChips();
  populateMagArticoli();
  renderRiepilogo();
}

// ===== RIEPILOGO =====
function renderRiepilogo() {
  const anno = new Date().getFullYear();
  const mc = contData.movimentiContabili || [];
  const mv = magData.movimentazioni || [];
  const art = magData.articoli || [];

  const entAnno = mc.filter(m=>m.tipo==='entrata'&&m.data&&m.data.startsWith(anno)).reduce((s,m)=>s+parseFloat(m.importo||0),0);
  const uscAnno = mc.filter(m=>m.tipo==='uscita'&&m.data&&m.data.startsWith(anno)).reduce((s,m)=>s+parseFloat(m.importo||0),0);
  const saldo = entAnno - uscAnno;

  // giacenza per articolo
  function getGiac(id) {
    return mv.filter(m=>m.articoloId===id).reduce((s,m)=>{
      if(m.tipo==='entrata') return s+parseFloat(m.qta||0);
      if(m.tipo==='uscita') return s-parseFloat(m.qta||0);
      return parseFloat(m.qta||0);
    },0);
  }

  // ultimi 5 movimenti combinati
  const recentCont = mc.slice().sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5).map(m=>({
    tipo: m.tipo==='entrata'?'entrata':'uscita',
    val: (m.tipo==='entrata'?'+':'−')+'€'+fmt(m.importo),
    valClass: m.tipo==='entrata'?'green':'red',
    desc: m.descrizione||'—',
    date: formatDate(m.data),
    icon: m.tipo==='entrata'?'💰':'💸'
  }));
  const recentMag = mv.slice().sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5).map(m=>{
    const a = art.find(x=>x.id===m.articoloId);
    return {
      tipo: m.tipo==='entrata'?'mag-in':'mag-out',
      val: (m.tipo==='entrata'?'+':'−')+parseFloat(m.qta||0)+' '+(a?.unita||''),
      valClass: m.tipo==='entrata'?'blue':'amber',
      desc: a?.nome||'—',
      date: formatDate(m.data),
      icon: '📦'
    };
  });

  // scorte sotto soglia
  const sottoSoglia = art.filter(a=>a.soglia && getGiac(a.id) <= parseFloat(a.soglia));

  document.getElementById('riepilogoContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:1rem">
      <div class="info-card">
        <div class="info-card-title">Saldo ${anno}</div>
        <div class="info-card-val ${saldo>=0?'green':'red'}">${saldo>=0?'+':''}€${fmt(saldo)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Entrate ${anno}</div>
        <div class="info-card-val green">+€${fmt(entAnno)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Uscite ${anno}</div>
        <div class="info-card-val red">−€${fmt(uscAnno)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-title">Arnie attive</div>
        <div class="info-card-val amber">${(dbData.arnie||[]).filter(a=>a.status==='attiva').length}</div>
      </div>
    </div>

    ${sottoSoglia.length > 0 ? `
    <div style="background:#fce8e8;border:1px solid var(--red);border-radius:8px;padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.88rem;color:var(--red)">
      ⚠️ <strong>Scorte sotto soglia:</strong> ${sottoSoglia.map(a=>a.nome).join(', ')}
    </div>` : ''}

    <div class="section-label">Ultimi movimenti contabili</div>
    <div class="recent-list">
      ${recentCont.length === 0
        ? '<div style="color:var(--text-light);font-style:italic;font-size:0.88rem;padding:0.5rem">Nessun movimento.</div>'
        : recentCont.map(m=>`
        <div class="recent-item ${m.tipo}">
          <span style="font-size:1.2rem">${m.icon}</span>
          <div class="recent-item-info">
            <div class="recent-item-desc">${m.desc}</div>
            <div class="recent-item-date">${m.date}</div>
          </div>
          <span class="recent-item-val ${m.valClass}">${m.val}</span>
        </div>`).join('')}
    </div>

    <div class="section-label" style="margin-top:1.2rem">Ultimi movimenti magazzino</div>
    <div class="recent-list">
      ${recentMag.length === 0
        ? '<div style="color:var(--text-light);font-style:italic;font-size:0.88rem;padding:0.5rem">Nessun movimento.</div>'
        : recentMag.map(m=>`
        <div class="recent-item ${m.tipo}">
          <span style="font-size:1.2rem">${m.icon}</span>
          <div class="recent-item-info">
            <div class="recent-item-desc">${m.desc}</div>
            <div class="recent-item-date">${m.date}</div>
          </div>
          <span class="recent-item-val ${m.valClass}">${m.val}</span>
        </div>`).join('')}
    </div>
  `;
}

// ===== CONTABILITÀ FORM =====
function setTipoCont(tipo) {
  tipoContabile = tipo;
  document.getElementById('btnEntrata').className = 'tipo-toggle-btn' + (tipo==='entrata'?' active-entrata':'');
  document.getElementById('btnUscita').className  = 'tipo-toggle-btn' + (tipo==='uscita'?' active-uscita':'');
  renderCatChips();
}

function renderCatChips() {
  const cats = tipoContabile === 'entrata' ? CAT_ENTRATA : CAT_USCITA;
  document.getElementById('contCatChips').innerHTML = cats.map(c=>`
    <label class="chip"><input type="checkbox" value="${c.id}">${c.label}</label>
  `).join('');
  // toggle selected class on click
  document.querySelectorAll('#contCatChips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const cb = chip.querySelector('input');
      chip.classList.toggle('selected', cb.checked);
    });
  });
}

async function saveContabilita() {
  const importo = document.getElementById('contImporto').value;
  const desc    = document.getElementById('contDesc').value.trim();
  const data    = document.getElementById('contData').value;
  if(!importo || !desc || !data) { showToast('⚠️ Compila importo, descrizione e data'); return; }

  const categorie = Array.from(document.querySelectorAll('#contCatChips input:checked')).map(x=>x.value);
  const mov = {
    id: Date.now().toString(), data,
    tipo: tipoContabile,
    descrizione: desc,
    importo: parseFloat(importo),
    categorie,
    note: document.getElementById('contNote').value.trim()
  };

  const btn = document.getElementById('btnSaveCont');
  btn.disabled = true;
  btn.textContent = '⏳ Salvataggio...';

  try {
    if(!contData.movimentiContabili) contData.movimentiContabili = [];
    contData.movimentiContabili.unshift(mov);
    contData.savedAt = new Date().toISOString();
    await driveWriteFile(FILENAME_CONT, contData);

    document.getElementById('formContSuccessMsg').textContent =
      `${tipoContabile==='entrata'?'+':'−'}€${fmt(mov.importo)} — ${desc}`;
    document.getElementById('formCont').style.display = 'none';
    document.getElementById('formContSuccess').classList.add('show');
  } catch(e) {
    showToast('❌ Errore salvataggio: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salva movimento';
  }
}

function resetFormCont() {
  document.getElementById('formContSuccess').classList.remove('show');
  document.getElementById('formCont').style.display = 'block';
  document.getElementById('contImporto').value = '';
  document.getElementById('contDesc').value = '';
  document.getElementById('contNote').value = '';
  document.getElementById('contData').value = today();
  renderCatChips();
  document.getElementById('contImporto').focus();
}

// ===== MAGAZZINO FORM =====
function populateMagArticoli() {
  const sel = document.getElementById('magArticolo');
  const arts = magData.articoli || [];
  sel.innerHTML = '<option value="">— Seleziona articolo —</option>' +
    arts.map(a=>`<option value="${a.id}" data-unita="${a.unita}">${a.nome} (${a.unita})</option>`).join('');
  sel.onchange = () => {
    const opt = sel.options[sel.selectedIndex];
    const unita = opt?.dataset?.unita || '';
    document.getElementById('magUnitaLabel').textContent = unita ? `(${unita})` : '';
  };
}

function setTipoMag(tipo) {
  tipoMagazzino = tipo;
  document.getElementById('btnMagIn').className  = 'tipo-toggle-btn' + (tipo==='entrata'?' active-entrata':'');
  document.getElementById('btnMagOut').className = 'tipo-toggle-btn' + (tipo==='uscita'?' active-uscita':'');
}

async function saveMagazzino() {
  const artId = document.getElementById('magArticolo').value;
  const qta   = document.getElementById('magQta').value;
  const data  = document.getElementById('magData').value;
  if(!artId || !qta || !data) { showToast('⚠️ Seleziona articolo, quantità e data'); return; }

  const art = (magData.articoli||[]).find(a=>a.id===artId);
  const mov = {
    id: Date.now().toString(), data,
    articoloId: artId,
    tipo: tipoMagazzino,
    qta: parseFloat(qta),
    note: document.getElementById('magNote').value.trim()
  };

  const btn = document.getElementById('btnSaveMag');
  btn.disabled = true;
  btn.textContent = '⏳ Salvataggio...';

  try {
    if(!magData.movimentazioni) magData.movimentazioni = [];
    magData.movimentazioni.push(mov);
    magData.savedAt = new Date().toISOString();
    await driveWriteFile(FILENAME_MAG, magData);

    document.getElementById('formMagSuccessMsg').textContent =
      `${tipoMagazzino==='entrata'?'+':'−'}${qta} ${art?.unita||''} di ${art?.nome||'—'}`;
    document.getElementById('formMag').style.display = 'none';
    document.getElementById('formMagSuccess').classList.add('show');
  } catch(e) {
    showToast('❌ Errore salvataggio: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salva movimento';
  }
}

function resetFormMag() {
  document.getElementById('formMagSuccess').classList.remove('show');
  document.getElementById('formMag').style.display = 'block';
  document.getElementById('magQta').value = '';
  document.getElementById('magNote').value = '';
  document.getElementById('magData').value = today();
  document.getElementById('magArticolo').value = '';
  document.getElementById('magUnitaLabel').textContent = '';
}
</script>
</body>
